# Match the scraper/api repos so ruff (check + format) behaves consistently and
# `ruff format` doesn't reformat the vendored copies (it defaults to 88 chars
# otherwise, which would diverge them from the canonical scraper repo).
line-length = 100
target-version = "py311"
exclude = ["pp_db"]

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["UP017", "UP037"]
