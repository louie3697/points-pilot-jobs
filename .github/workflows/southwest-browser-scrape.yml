name: southwest-browser-scrape

# Southwest browser scrape, run entirely within this repo (GH Actions / Azure IP mints a valid
# F5/Shape sensor token where Fly's IP would be blocked). scrapers/ config/ pp_db/ pipeline/ are
# vendored; scrapers/browser.py + scrapers/southwest.py are canonical here. Headful Chrome under
# xvfb (Shape/Akamai score headless harshly). Writes Southwest rows into Postgres `flights`.
on:
  workflow_dispatch:
    inputs:
      origin:
        description: "Origin IATA (single-route on-demand mode). Blank = popular-routes cron."
        required: false
        default: ""
      destination:
        description: "Destination IATA (single-route on-demand mode)."
        required: false
        default: ""
      dates:
        description: "Comma-separated ISO dates (YYYY-MM-DD). Blank = near-term window."
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC, staggered after the Delta scrape (08:00 UTC)

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ inputs.origin != '' && format('southwest-ondemand-{0}-{1}', inputs.origin, inputs.destination) || 'southwest-browser-scrape' }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/louie2074/points-pilot-jobs-scraper:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --shm-size=2g
    # 22 routes × both directions: Southwest's F5/Shape per-request sensor makes it
    # the slowest scrape, and the old 75-min cap cancelled a full run mid-flight.
    # This is a ceiling, not the runtime — typical runs finish well under it.
    timeout-minutes: 150
    # 3 shards on separate runner IPs split the due set (stride-sharded by build_queue_plan),
    # each staying at the proven 20 legs/shard — Southwest's F5/Shape per-session ceiling is
    # uncharacterized, so we add IPs rather than push one IP higher. On-demand single-route
    # dispatch still spawns all shards, but only shard 0 does the work.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - name: Scrape Southwest (headful Chrome under xvfb, Azure IP)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          BETTERSTACK_INGEST_URL: ${{ secrets.BETTERSTACK_INGEST_URL }}
          BETTERSTACK_LOGS_TOKEN: ${{ secrets.BETTERSTACK_LOGS_TOKEN }}
          BETTERSTACK_LOGS_INGEST_URL: ${{ secrets.BETTERSTACK_LOGS_INGEST_URL }}
          SOUTHWEST_HEARTBEAT_URL: ${{ secrets.SOUTHWEST_HEARTBEAT_URL }}
          SOUTHWEST_SCRAPE_DAYS: "14"
          SOUTHWEST_SHARDS: "5"
          SOUTHWEST_SHARD_INDEX: ${{ matrix.shard }}
          SOUTHWEST_ROUTE_ORIGIN: ${{ inputs.origin }}
          SOUTHWEST_ROUTE_DEST: ${{ inputs.destination }}
          SOUTHWEST_ROUTE_DATES: ${{ inputs.dates }}
        run: xvfb-run -a python southwest_browser_scrape.py
