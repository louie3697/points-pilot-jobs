name: southwest-browser-scrape

  # Southwest browser scrape, run entirely within this repo (GH Actions / Azure IP mints a valid
  # F5/Shape sensor token where Fly's IP would be blocked). Blocked-state probe mode keeps this to
  # one daily low-rate shard until 403 recovery. scrapers/ config/ pp_db/ pipeline/ are vendored;
  # scrapers/browser.py + scrapers/southwest.py are canonical here. Headful Chrome under xvfb
  # (Shape/Akamai score headless harshly). Writes Southwest rows into Postgres `flights`.
on:
  workflow_dispatch:
    inputs:
      origin:
        description: "Origin IATA (single-route on-demand mode). Blank = popular-routes cron."
        required: false
        default: ""
      destination:
        description: "Destination IATA (single-route on-demand mode)."
        required: false
        default: ""
      dates:
        description: "Comma-separated ISO dates (YYYY-MM-DD). Blank = near-term window."
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC, staggered after the Delta scrape (08:00 UTC)

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ inputs.origin != '' && format('southwest-ondemand-{0}-{1}', inputs.origin, inputs.destination) || 'southwest-browser-scrape' }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/louie3697/points-pilot-jobs-scraper:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --shm-size=2g
    # 1-shard probe mode while Southwest is 403-blocked on Azure; keep the window short (30d) and
    # a low per-IP leg cap to reduce repeat bans.
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        shard: [0]
    steps:
      - uses: actions/checkout@v6
      - name: Scrape Southwest (headful Chrome under xvfb, Azure IP)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          BETTERSTACK_INGEST_URL: ${{ secrets.BETTERSTACK_INGEST_URL }}
          BETTERSTACK_LOGS_TOKEN: ${{ secrets.BETTERSTACK_LOGS_TOKEN }}
          BETTERSTACK_LOGS_INGEST_URL: ${{ secrets.BETTERSTACK_LOGS_INGEST_URL }}
          SOUTHWEST_HEARTBEAT_URL: ${{ secrets.SOUTHWEST_HEARTBEAT_URL }}
          SOUTHWEST_SCRAPE_DAYS: "30"
          SOUTHWEST_SHARDS: "1"
          SOUTHWEST_MAX_LEGS_PER_SHARD: "1"
          SOUTHWEST_SHARD_INDEX: ${{ matrix.shard }}
          SOUTHWEST_ROUTE_ORIGIN: ${{ inputs.origin }}
          SOUTHWEST_ROUTE_DEST: ${{ inputs.destination }}
          SOUTHWEST_ROUTE_DATES: ${{ inputs.dates }}
        run: xvfb-run -a python southwest_browser_scrape.py
