name: etihad-capture

# Throwaway recon (workflow_dispatch only): drive the Etihad Guest JFK->AUH award search in
# headful Chrome under xvfb on the Azure IP (clears Akamai+Imperva where a residential CDP nav
# draws the "Pardon Our Interruption" ABP block) and capture the FULL availability request +
# response, to build scrapers/etihad.py. Writes nothing to the DB. Uploads cap_etihad_full.json
# + etihad_capture.png as artifacts; also prints a log-readable summary.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Capture Etihad award API (headful Chrome under xvfb, Azure IP)
        run: xvfb-run -a python -u etihad_capture.py
      - name: Upload capture + screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etihad-capture
          path: |
            cap_etihad_full.json
            cap_etihad_net.json
            etihad_*.png
          if-no-files-found: ignore
