name: turkish-validate

# Validation (workflow_dispatch only): run the Turkish Miles&Smiles scraper against a few
# US->IST routes in headful Chrome under xvfb on the Azure IP and print the records — confirms
# end-to-end award extraction works before wiring the DB-writing cron. No DB write (dummy token).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate Turkish scraper (headful Chrome under xvfb, Azure IP)
        env:
          MOTHERDUCK_TOKEN: dummy   # import-time settings gate only; this script never hits the DB
        run: xvfb-run -a python turkish_validate.py
