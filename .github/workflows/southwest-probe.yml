name: southwest-probe

# One-shot datacenter-IP mint probe (manual only). Southwest award search is gated by an
# F5/Shape Security per-request JS sensor; a residential headful Chrome mints it cleanly
# (validated 3/3). The open question is whether GH Actions / Azure can mint a token Shape
# ACCEPTS, or gets 403'd. Headful Chrome under xvfb. Inspect the screenshot artifact + the
# job-log verdict. Writes NOTHING to MotherDuck.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Probe Southwest mint (headful Chrome under xvfb, Azure IP)
        run: xvfb-run -a python southwest_probe.py
      - name: Upload screenshot + html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: southwest-probe-artifacts
          path: |
            /tmp/southwest_probe.png
            /tmp/southwest_probe.html
          if-no-files-found: warn
