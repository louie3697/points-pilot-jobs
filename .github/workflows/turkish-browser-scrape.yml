name: turkish-browser-scrape

# Turkish Airlines Miles&Smiles award scrape, run entirely in this repo (GH Actions / Azure IP
# clears Turkish's TLS-fingerprint block + PerimeterX where Fly's IP can't). Headful Chrome under
# xvfb. Writes Turkish rows into Postgres `flights`. The availability API is the public
# /api/v1/availability (moduleType:AWARD); session headers are client-generated UUIDs and PX 428
# crypto-challenges are auto-solved + retried in-page. (websockets pinned <15 — see requirements.)
on:
  workflow_dispatch:
    inputs:
      origin:
        description: "Origin IATA (single-route on-demand mode). Blank = popular-routes cron."
        required: false
        default: ""
      destination:
        description: "Destination IATA (single-route on-demand mode)."
        required: false
        default: ""
      dates:
        description: "Comma-separated ISO dates (YYYY-MM-DD). Blank = near-term 5-day window."
        required: false
        default: ""
  schedule:
    - cron: "0 10 * * *"   # daily at 10:00 UTC (staggered clear of delta 08:00 + southwest 09:00)

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ inputs.origin != '' && format('turkish-ondemand-{0}-{1}', inputs.origin, inputs.destination) || 'turkish-browser-scrape' }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/louie3697/points-pilot-jobs-scraper:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --shm-size=2g
    timeout-minutes: 60
    # Turkish has ~50 directed legs, but the per-shard cap is 20 — one shard could only
    # cover part of the catalogue per day. Three parallel runs on separate runner IPs
    # stride-shard the scored due-batch, so 3 × 20 = 60 legs = full daily coverage. On-demand
    # single-route dispatch still spawns both shards, but only shard 0 does the work.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    steps:
      - uses: actions/checkout@v6
      - name: Scrape Turkish (headful Chrome under xvfb, Azure IP)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          BETTERSTACK_INGEST_URL: ${{ secrets.BETTERSTACK_INGEST_URL }}
          BETTERSTACK_LOGS_TOKEN: ${{ secrets.BETTERSTACK_LOGS_TOKEN }}
          BETTERSTACK_LOGS_INGEST_URL: ${{ secrets.BETTERSTACK_LOGS_INGEST_URL }}
          TURKISH_HEARTBEAT_URL: ${{ secrets.TURKISH_HEARTBEAT_URL }}
          TURKISH_SCRAPE_DAYS: "5"
          TURKISH_SHARDS: "3"
          TURKISH_SHARD_INDEX: ${{ matrix.shard }}
          TURKISH_ROUTE_ORIGIN: ${{ inputs.origin }}
          TURKISH_ROUTE_DEST: ${{ inputs.destination }}
          TURKISH_ROUTE_DATES: ${{ inputs.dates }}
        run: xvfb-run -a python turkish_browser_scrape.py
