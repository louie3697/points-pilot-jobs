name: delta-browser-scrape

# Delta browser scrape, run entirely within this repo (GH Actions / Azure IP clears Delta's
# Akamai edge block — HTTP 200 — where Fly's IP gets 444). The scrapers/ config/ db/ pipeline/
# packages are VENDORED from points-pilot-scrapers (see VENDORED_DELTA.md), so no cross-repo
# checkout / PAT is needed. Headful Chrome under xvfb (Akamai challenges headless). Writes Delta
# rows into MotherDuck `flights`.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC (clear of cleanup-flights 03:15 + transfer-bonuses 09:00)

permissions:
  contents: read

concurrency:
  group: delta-browser-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Scrape Delta (headful Chrome under xvfb, Azure IP)
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          DELTA_SCRAPE_DAYS: "5"
        run: xvfb-run -a python delta_browser_scrape.py
