name: airfrance-capture

# Throwaway recon (workflow_dispatch only): drive the Air France Flying Blue JFK->CDG award search
# (Book with Miles) in headful Chrome under xvfb on the Azure IP and capture the availability via a
# page-fetch interceptor + CDP Network capture (SW bypassed) + DOM/widget dumps. No DB writes.
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Capture Air France award flow (headful Chrome under xvfb, Azure IP)
        run: xvfb-run -a python -u airfrance_capture.py
      - name: Upload capture + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: airfrance-capture
          path: |
            cap_airfrance_full.json
            cap_airfrance_net.json
            cap_airfrance_results.html
            cap_airfrance_widget.html
            airfrance_*.png
          if-no-files-found: ignore
