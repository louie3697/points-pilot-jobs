name: transfer-bonuses

# Scrape travel-on-points.com for current transfer bonuses and snapshot-replace
# the transfer_bonuses table in MotherDuck. Runs twice monthly; can also be
# triggered manually (with optional dry-run mode).
on:
  schedule:
    # 9am UTC on the 1st and 15th of each month.
    - cron: "0 9 1,15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch + parse, but skip DELETE/INSERT"
        type: boolean
        default: false

# Least-privilege: only needs repo checkout; DB credential via secret.
permissions:
  contents: read

# Never let two runs overlap on the shared MotherDuck table.
concurrency:
  group: transfer-bonuses
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # nodriver drives Chrome via CDP — install a real Chrome binary.
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - run: pip install -r requirements.txt
      - name: Scrape and reconcile transfer bonuses
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
        run: python transfer_bonuses.py ${{ inputs.dry_run && '--dry-run' || '' }}
