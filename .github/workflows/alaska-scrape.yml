name: Alaska award scrape

on:
  workflow_dispatch:
  schedule:
    # 4x/day, offset to :17 and clear of the 08-11 UTC award-browser block. Alaska keeps
    # 5 shards; each shard is capped at 8 routes to finish within the runner budget.
    - cron: "17 1,7,13,19 * * *"

permissions:
  contents: read

concurrency:
  group: alaska-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: scrape
        run: python alaska_scrape.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          BETTERSTACK_INGEST_URL: ${{ secrets.BETTERSTACK_INGEST_URL }}
          BETTERSTACK_LOGS_TOKEN: ${{ secrets.BETTERSTACK_LOGS_TOKEN }}
          BETTERSTACK_LOGS_INGEST_URL: ${{ secrets.BETTERSTACK_LOGS_INGEST_URL }}
          ALASKA_HEARTBEAT_URL: ${{ secrets.ALASKA_HEARTBEAT_URL }}
          ALASKA_SHARDS: "5"
          ALASKA_SHARD_INDEX: ${{ matrix.shard }}
          ALASKA_MAX_ROUTES_PER_SHARD: "8"
          # 3-month horizon (dense 0-14d / sparse to 30d / weekly coarse tail to 90d ≈ 29 dates).
          # Alaska carries the international partner award space Explore surfaces; httpx is cheap.
          ALASKA_SCRAPE_DAYS: "90"
